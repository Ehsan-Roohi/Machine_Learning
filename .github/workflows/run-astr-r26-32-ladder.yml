name: Run ASTR R26 32x32 ladder by 2000 steps

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'run-astr-r26-32-ladder-trigger.txt'

permissions:
  contents: read
  actions: read

concurrency:
  group: astr-r26-32-ladder-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  r26-32-ladder:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler and analysis libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran cmake make openmpi-bin libopenmpi-dev \
            libhdf5-openmpi-dev unzip zip \
            python3-h5py python3-numpy python3-scipy python3-matplotlib python3-pandas

      - name: Download verified ASTR source bundle
        uses: actions/download-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005
          run-id: 29624062741
          github-token: ${{ github.token }}
          path: source_artifact

      - name: Download successful R26 2000-step seed
        uses: actions/download-artifact@v4
        with:
          name: ASTR_R26_STAGE1_SHORT_GATES_U100_KN005
          run-id: 29652406167
          github-token: ${{ github.token }}
          path: r26_seed_artifact

      - name: Download validated R13 40k reference
        uses: actions/download-artifact@v4
        with:
          name: ASTR_R13_JFM_CAVITY_FROM_SCRATCH_40000
          run-id: 29647840498
          github-token: ${{ github.token }}
          path: r13_artifact

      - name: Restore source, R26 seed, and R13 reference
        shell: bash
        run: |
          set -euxo pipefail

          SOURCE_INNER=$(find source_artifact -type f -name 'ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005.zip' -print -quit)
          test -n "$SOURCE_INNER"
          mkdir source_restored
          unzip -q "$SOURCE_INNER" -d source_restored
          test -d source_restored/astr
          cp -a source_restored/astr ./astr
          rm -rf astr/build

          R26_INNER=$(find r26_seed_artifact -type f -name 'ASTR_R26_STAGE1_SHORT_GATES_U100_KN005.zip' -print -quit)
          test -n "$R26_INNER"
          mkdir r26_seed_restored
          unzip -q "$R26_INNER" -d r26_seed_restored
          R26_ROOT=$(find r26_seed_restored -type d -name 'ASTR_R26_STAGE1_SHORT_GATES_U100_KN005' -print -quit)
          test -n "$R26_ROOT"
          test -f "$R26_ROOT/cases/u100_32_2000/outdat/flowfield.h5"
          cp -a "$R26_ROOT/cases/u100_32_2000" ./r26_case

          R13_INNER=$(find r13_artifact -type f -name 'ASTR_R13_JFM_CAVITY_FROM_SCRATCH_40000.zip' -print -quit)
          test -n "$R13_INNER"
          mkdir r13_restored
          unzip -q "$R13_INNER" -d r13_restored
          R13_ROOT=$(find r13_restored -type d -name 'ASTR_R13_JFM_CAVITY_FROM_SCRATCH_40000' -print -quit)
          test -n "$R13_ROOT"
          cp -a "$R13_ROOT" ./r13_40k
          cp -a r13_40k/input r13_40k/datin

      - name: Apply exact audited R26 Stage-1 patch and build
        shell: bash
        run: |
          set -euxo pipefail
          python3 astr_r26_stage1/patch_r26_stage1.py astr \
            --report r26_stage1_source_audit.json \
            --patch-output ASTR_R26_STAGE1.patch
          cmake -S astr -B astr/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build astr/build -j 2
          test -x astr/build/bin/astr

      - name: Prepare restart from validated step 2000
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p checkpoints summaries convergence logs comparison
          python3 - <<'PY'
          from pathlib import Path
          import h5py, shutil

          case = Path('r26_case')
          input_path = next((case/'datin').glob('input.astr*'))
          lines = input_path.read_text().splitlines()
          for i, line in enumerate(lines):
              if line.strip().startswith('# lrestar'):
                  lines[i+1] = 't'
                  break
          else:
              raise RuntimeError('lrestar entry not found')
          input_path.write_text('\n'.join(lines)+'\n')

          with h5py.File(case/'outdat/flowfield.h5','r') as h:
              assert int(h['nstep'][0]) == 2000
              assert float(h['time'][0]) > 0.0
          with h5py.File(case/'outdat/auxiliary.h5','r') as h:
              assert int(h['nstep'][0]) == 2000

          dst = Path('checkpoints/step_02000')
          dst.mkdir(parents=True)
          shutil.copy2(case/'outdat/flowfield.h5', dst/'flowfield.h5')
          shutil.copy2(case/'outdat/auxiliary.h5', dst/'auxiliary.h5')
          shutil.copy2(case/'case_metadata.json', dst/'case_metadata.json')
          PY

      - name: Continue R26 from 2000 to 4000
        shell: bash
        run: |
          set -euxo pipefail
          TARGET=4000 PREVIOUS=2000 LABEL=step_04000 bash -c '
            python3 - "$TARGET" <<"PY"
          import sys
          from pathlib import Path
          target=int(sys.argv[1]); p=Path("r26_case/datin/controller")
          lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith("# maxstep,feqchkpt"):
                  lines[i+1]=f"{target:9d},    2000,    2000,     500,     200,   200"
                  break
          p.write_text("\n".join(lines)+"\n")
          PY
            INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name "input.astr*" -print -quit)")
            cd r26_case
            /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > ../logs/step_04000.log 2> ../logs/step_04000_time.log
            cd ..
            ! grep -q "COMPUTATION CRASHED" logs/step_04000.log
            python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step 4000 --output summaries/step_04000.json
          '
          python3 - <<'PY'
          from pathlib import Path
          import h5py, json, numpy as np, shutil
          fields=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          prev=Path('checkpoints/step_02000/flowfield.h5'); cur=Path('r26_case/outdat/flowfield.h5')
          report={'previous_step':2000,'current_step':4000,'relative_RMS_change_percent':{}}
          with h5py.File(prev,'r') as a,h5py.File(cur,'r') as b:
              for k in fields:
                  x=np.asarray(a[k],float); y=np.asarray(b[k],float)
                  report['relative_RMS_change_percent'][k]=float(100*np.sqrt(np.mean((y-x)**2))/(np.sqrt(np.mean(y*y))+1e-30))
          Path('convergence/step_02000_to_04000.json').write_text(json.dumps(report,indent=2))
          d=Path('checkpoints/step_04000'); d.mkdir(); shutil.copy2(cur,d/'flowfield.h5'); shutil.copy2('r26_case/outdat/auxiliary.h5',d/'auxiliary.h5')
          print(json.dumps(report,indent=2))
          PY

      - name: Continue R26 from 4000 to 6000
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p=Path('r26_case/datin/controller'); lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# maxstep,feqchkpt'):
                  lines[i+1]=f"{6000:9d},    2000,    2000,     500,     200,   200"; break
          p.write_text('\n'.join(lines)+'\n')
          PY
          INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd r26_case
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > ../logs/step_06000.log 2> ../logs/step_06000_time.log
          cd ..
          ! grep -q 'COMPUTATION CRASHED' logs/step_06000.log
          python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step 6000 --output summaries/step_06000.json
          python3 - <<'PY'
          from pathlib import Path
          import h5py, json, numpy as np, shutil
          fields=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          prev=Path('checkpoints/step_04000/flowfield.h5'); cur=Path('r26_case/outdat/flowfield.h5')
          report={'previous_step':4000,'current_step':6000,'relative_RMS_change_percent':{}}
          with h5py.File(prev,'r') as a,h5py.File(cur,'r') as b:
              for k in fields:
                  x=np.asarray(a[k],float); y=np.asarray(b[k],float)
                  report['relative_RMS_change_percent'][k]=float(100*np.sqrt(np.mean((y-x)**2))/(np.sqrt(np.mean(y*y))+1e-30))
          Path('convergence/step_04000_to_06000.json').write_text(json.dumps(report,indent=2))
          d=Path('checkpoints/step_06000'); d.mkdir(); shutil.copy2(cur,d/'flowfield.h5'); shutil.copy2('r26_case/outdat/auxiliary.h5',d/'auxiliary.h5')
          print(json.dumps(report,indent=2))
          PY

      - name: Continue R26 from 6000 to 8000
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p=Path('r26_case/datin/controller'); lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# maxstep,feqchkpt'):
                  lines[i+1]=f"{8000:9d},    2000,    2000,     500,     200,   200"; break
          p.write_text('\n'.join(lines)+'\n')
          PY
          INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd r26_case
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > ../logs/step_08000.log 2> ../logs/step_08000_time.log
          cd ..
          ! grep -q 'COMPUTATION CRASHED' logs/step_08000.log
          python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step 8000 --output summaries/step_08000.json
          python3 - <<'PY'
          from pathlib import Path
          import h5py, json, numpy as np, shutil
          fields=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          prev=Path('checkpoints/step_06000/flowfield.h5'); cur=Path('r26_case/outdat/flowfield.h5')
          report={'previous_step':6000,'current_step':8000,'relative_RMS_change_percent':{}}
          with h5py.File(prev,'r') as a,h5py.File(cur,'r') as b:
              for k in fields:
                  x=np.asarray(a[k],float); y=np.asarray(b[k],float)
                  report['relative_RMS_change_percent'][k]=float(100*np.sqrt(np.mean((y-x)**2))/(np.sqrt(np.mean(y*y))+1e-30))
          Path('convergence/step_06000_to_08000.json').write_text(json.dumps(report,indent=2))
          d=Path('checkpoints/step_08000'); d.mkdir(); shutil.copy2(cur,d/'flowfield.h5'); shutil.copy2('r26_case/outdat/auxiliary.h5',d/'auxiliary.h5')
          print(json.dumps(report,indent=2))
          PY

      - name: Continue R26 from 8000 to 10000
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p=Path('r26_case/datin/controller'); lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# maxstep,feqchkpt'):
                  lines[i+1]=f"{10000:9d},    2000,    2000,     500,     200,   200"; break
          p.write_text('\n'.join(lines)+'\n')
          PY
          INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd r26_case
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > ../logs/step_10000.log 2> ../logs/step_10000_time.log
          cd ..
          ! grep -q 'COMPUTATION CRASHED' logs/step_10000.log
          python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step 10000 --output summaries/step_10000.json
          python3 - <<'PY'
          from pathlib import Path
          import h5py, json, numpy as np, shutil
          fields=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          prev=Path('checkpoints/step_08000/flowfield.h5'); cur=Path('r26_case/outdat/flowfield.h5')
          report={'previous_step':8000,'current_step':10000,'relative_RMS_change_percent':{}}
          with h5py.File(prev,'r') as a,h5py.File(cur,'r') as b:
              for k in fields:
                  x=np.asarray(a[k],float); y=np.asarray(b[k],float)
                  report['relative_RMS_change_percent'][k]=float(100*np.sqrt(np.mean((y-x)**2))/(np.sqrt(np.mean(y*y))+1e-30))
          Path('convergence/step_08000_to_10000.json').write_text(json.dumps(report,indent=2))
          d=Path('checkpoints/step_10000'); d.mkdir(); shutil.copy2(cur,d/'flowfield.h5'); shutil.copy2('r26_case/outdat/auxiliary.h5',d/'auxiliary.h5')
          print(json.dumps(report,indent=2))
          PY

      - name: Build ladder summary and preliminary R26/R13/DSMC comparison
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          rows=[]
          for p in sorted(Path('convergence').glob('step_*.json')):
              d=json.loads(p.read_text())
              row={'previous_step':d['previous_step'],'current_step':d['current_step']}
              row.update(d['relative_RMS_change_percent'])
              rows.append(row)
          df=pd.DataFrame(rows)
          df.to_csv('convergence/r26_32_ladder_convergence.csv',index=False)
          Path('convergence/r26_32_ladder_convergence.json').write_text(json.dumps(rows,indent=2))
          print(df.to_string(index=False))
          PY

          python3 astr_r26_stage1/compare_r26_r13_dsmc.py \
            --r26-case r26_case --r13-case r13_40k --output comparison

      - name: Package complete R26 ladder result
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          ROOT=ASTR_R26_STAGE1_32X32_LADDER_2K_TO_10K
          mkdir -p "$ROOT"
          cp -a astr_r26_stage1 "$ROOT/code"
          cp ASTR_R26_STAGE1.patch r26_stage1_source_audit.json "$ROOT/" || true
          cp -a checkpoints summaries convergence logs comparison "$ROOT/" || true
          mkdir -p "$ROOT/final_case"
          cp -a r26_case/datin r26_case/outdat r26_case/bakup r26_case/case_metadata.json "$ROOT/final_case/" || true
          cp -a astr/src "$ROOT/patched_source_src"
          zip -r -9 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"

      - name: Upload R26 ladder artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ASTR_R26_STAGE1_32X32_LADDER_2K_TO_10K
          path: |
            ASTR_R26_STAGE1_32X32_LADDER_2K_TO_10K.zip
            ASTR_R26_STAGE1_32X32_LADDER_2K_TO_10K.zip.sha256
          compression-level: 0
          retention-days: 7
