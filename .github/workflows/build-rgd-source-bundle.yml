name: Build RGD source bundle

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-rgd-source-bundle.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout helper repository
        uses: actions/checkout@v4

      - name: Clone and package selected repositories
        shell: bash
        run: |
          set -u
          ROOT="RGD_CURATED_SOURCES_2026-07-17"
          rm -rf "$ROOT" "${ROOT}.zip" "${ROOT}.zip.sha256"
          mkdir -p "$ROOT/repos" "$ROOT/metadata"
          : > "$ROOT/metadata/clone_success.txt"
          : > "$ROOT/metadata/clone_failed.txt"
          cat > "$ROOT/metadata/repositories.txt" <<'EOF'
          lamBOOO/fenicsR13
          comp-physics/PyQBMMlib
          comp-physics/QBMMlib
          Satyvir-Singh/Satya_G13_DG_Code
          sbocce/hyper2D
          paulwilhelmvlasov/NumericalFlowIteration
          merzbild/Merzbild.jl
          OttTs/ParticLas.jl
          LeoBasov/dsmc-python
          donkozoltan/eduPIC
          LeoBasov/chemical-kinetics.jl
          knstmrd/VT-relaxation
          uqngibbo/equilibrium-c
          lkampoli/kappa
          knstmrd/paper_ec_trixi_chem
          AdmiralOctavio/Method-Of-Characteristics-Nozzle-Solver
          DGFSproj/DGFS-BE-Solver
          DGFSproj/DGFS-BE-TestCases
          EOF

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            owner="${repo%%/*}"
            name="${repo##*/}"
            dest="$ROOT/repos/${owner}__${name}"
            echo "Cloning $repo"
            if git clone --depth 1 --recurse-submodules --shallow-submodules "https://github.com/${repo}.git" "$dest"; then
              rm -rf "$dest/.git"
              find "$dest" -type d -name .git -prune -exec rm -rf {} + 2>/dev/null || true
              echo "$repo" >> "$ROOT/metadata/clone_success.txt"
            else
              rm -rf "$dest"
              echo "$repo" >> "$ROOT/metadata/clone_failed.txt"
            fi
          done < "$ROOT/metadata/repositories.txt"

          cat > "$ROOT/README_FIRST.txt" <<'EOF'
          RGD CURATED SOURCE COLLECTION
          Generated: 2026-07-17

          Contains selected small and medium research codes emphasizing moment methods,
          deterministic kinetic methods, compact DSMC/PIC codes, and nonequilibrium tools.

          Intentionally excluded: SPARTA, dsmcFoam, PICLAS, SU2, Eilmer, full Trixi,
          Cantera, Mutation++, and other very large production frameworks or redundant forks.

          Each repository remains under its original license and authorship.
          Consult each LICENSE/COPYING file before reuse or redistribution.
          EOF

          python - <<'PY'
          from pathlib import Path
          import hashlib, json
          root = Path('RGD_CURATED_SOURCES_2026-07-17')
          rows = []
          for p in sorted(root.rglob('*')):
              if p.is_file():
                  rows.append({
                      'path': str(p.relative_to(root)),
                      'bytes': p.stat().st_size,
                      'sha256': hashlib.sha256(p.read_bytes()).hexdigest(),
                  })
          (root/'metadata'/'file_manifest.json').write_text(
              json.dumps(rows, indent=2), encoding='utf-8')
          PY

          zip -r -9 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: RGD_CURATED_SOURCES_2026-07-17
          path: |
            RGD_CURATED_SOURCES_2026-07-17.zip
            RGD_CURATED_SOURCES_2026-07-17.zip.sha256
          compression-level: 0
          retention-days: 7

      - name: Publish run identifier
        shell: bash
        run: |
          mkdir -p workflow-status
          printf '%s\n' '${{ github.run_id }}' > workflow-status/rgd_bundle_run_id.txt
          printf '%s\n' '${{ github.sha }}' > workflow-status/rgd_bundle_commit_sha.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add workflow-status/rgd_bundle_run_id.txt workflow-status/rgd_bundle_commit_sha.txt
          git commit -m 'Record RGD bundle workflow run' || true
          git push
