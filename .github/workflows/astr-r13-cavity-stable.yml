name: ASTR nonlinear R13 JFM cavity stable-step run

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'astr-r13-stable-trigger.txt'

permissions:
  contents: read

jobs:
  run-r13-stable:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran cmake ninja-build git zip time \
            openmpi-bin libopenmpi-dev libhdf5-openmpi-dev hdf5-tools \
            python3 python3-numpy python3-h5py

      - name: Clone, patch, and build ASTR mom_merge
        run: |
          set -euxo pipefail
          rm -rf work results
          mkdir -p work results/logs results/patched_source_files
          git clone --depth 1 --branch mom_merge https://github.com/astr-code/astr.git work/astr
          git -C work/astr rev-parse HEAD | tee results/ASTR_MOM_MERGE_COMMIT.txt

          before=$(grep -c 'uwall = dble(nstep)\*deltat$' work/astr/src/methodmoment.F90)
          test "$before" -eq 2
          sed -i 's/uwall = dble(nstep)\*deltat$/uwall = dble(nstep)*deltat*10.0d0/' work/astr/src/methodmoment.F90
          after=$(grep -c 'uwall = dble(nstep)\*deltat\*10.0d0$' work/astr/src/methodmoment.F90)
          test "$after" -eq 2
          git -C work/astr diff -- src/methodmoment.F90 | tee results/ASTR_R13_LID_RAMP_CONSISTENCY.patch
          cp work/astr/src/methodmoment.F90 results/patched_source_files/methodmoment.F90

          cmake -S work/astr -B work/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=mpifort \
            -DBUILD_TESTING=OFF 2>&1 | tee results/logs/cmake.log
          cmake --build work/build --parallel 2 2>&1 | tee results/logs/build.log
          cmake --install work/build 2>&1 | tee results/logs/install.log
          test -x work/astr/bin/astr

      - name: Prepare JFM nonlinear R13 case
        run: |
          set -euxo pipefail
          mkdir -p work/case
          cp -a work/astr/examples/Lid-Driven-Cavity-Rarefied/datin work/case/
          sed -i 's/273.0d0, 2.629, 0.1625d0, 1.66667d0/300.d0,10.03136d0,0.309988d0,1.666667d0/' work/case/datin/input.ldcav2d
          sed -i 's/none,h,r26/none,h,r13/' work/case/datin/input.ldcav2d
          sed -i -E 's/^([[:space:]]*)100,[[:space:]]*100,[[:space:]]*100,[[:space:]]*50,[[:space:]]*10,[[:space:]]*50/     4000,     500,     500,     500,     100,   500/' work/case/datin/controller
          sed -i 's/^1.d-4$/5.d-5/' work/case/datin/controller
          cat > results/CASE_METADATA.txt <<'EOF'
          Gas: monatomic argon
          T_wall = 300 K
          U_lid = 100 m/s
          gamma = 5/3
          Mach input = 0.309988
          Kn target = 0.05
          Reynolds input = 10.03136
          ASTR relation: Kn = Mach/Re * sqrt(gamma*pi/2)
          Moment model: nonlinear R13
          Grid: 64 x 64
          Steps requested: 4000
          dt: 5e-5
          Nondimensional final time requested: 0.20
          Diffuse walls: alpha = 1
          Top wall ramp: U_wall=min(10*nstep*dt,1); full speed at step 2000
          Checkpoints every 500 steps
          Source consistency patch: the R13 moment-wall lid ramp was changed from nstep*dt to 10*nstep*dt so it matches the main-flow wall boundary.
          EOF
          cp work/case/datin/input.ldcav2d results/input_jfm_r13.ldcav2d
          cp work/case/datin/controller results/controller_jfm_r13

      - name: Run nonlinear R13 case
        run: |
          set +e
          cd work/case
          /usr/bin/time -v timeout 150m mpirun --oversubscribe -np 2 ../astr/bin/astr run ./datin/input.ldcav2d \
            > ../../results/logs/run_stdout.log 2> ../../results/logs/run_stderr_time.log
          rc=$?
          cd ../..
          echo "$rc" > results/RUN_EXIT_CODE.txt
          cp -a work/case results/case_output
          find results/case_output -maxdepth 5 -type f -printf '%p %s\n' | sort > results/OUTPUT_MANIFEST.txt
          exit 0

      - name: Record numerical completion state
        if: always()
        continue-on-error: true
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          import json, re
          info={}
          try:
              import h5py, numpy as np
              info['process_exit_code']=int(Path('results/RUN_EXIT_CODE.txt').read_text().strip())
              log=Path('results/logs/run_stdout.log').read_text(errors='replace')
              info['reported_crash']='COMPUTATION CRASHED' in log
              info['reported_job_done']='The job is done' in log
              steps=[int(x) for x in re.findall(r'^\s*(\d+)\s+0\.',log,flags=re.M)]
              info['last_listed_step']=max(steps) if steps else None
              out=Path('results/case_output/outdat/flowfield.h5')
              if out.exists():
                  with h5py.File(out,'r') as f:
                      info['checkpoint_step']=int(np.asarray(f['nstep']).ravel()[0])
                      info['checkpoint_time']=float(np.asarray(f['time']).ravel()[0])
                      finite=True
                      for d in f.values():
                          if isinstance(d,h5py.Dataset) and np.issubdtype(d.dtype,np.number):
                              finite = finite and bool(np.isfinite(d[()]).all())
                      info['all_datasets_finite']=finite
                      for key in ['ro','u1','u2','p','t','qx','qy','sigmaxx','sigmaxy','Rxx','Rxy','Ryy','Delta']:
                          if key in f:
                              a=np.asarray(f[key])
                              info[key+'_min']=float(np.nanmin(a)); info[key+'_max']=float(np.nanmax(a))
          except Exception as exc:
              info['analysis_error']=repr(exc)
          Path('results/NUMERICAL_STATUS.json').write_text(json.dumps(info,indent=2))
          print(json.dumps(info,indent=2))
          PY
          exit 0

      - name: Package results
        if: always()
        run: |
          set -euxo pipefail
          test -d results
          zip -r -9 ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED.zip results
          sha256sum ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED.zip > ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED.zip.sha256

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED
          path: |
            ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED.zip
            ASTR_NONLINEAR_R13_JFM_CAVITY_PATCHED.zip.sha256
          compression-level: 0
          retention-days: 7
