name: Test minimal R13 owner/no-mass extrapolation on Kn 0.010

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/run-r13-kn0010-owner-nomass-extrap.yml'
      - 'diagnostics/patch_r13_kn0010_recovery_variants.py'
      - 'diagnostics/analyze_kn0010_recovery_variant.py'
      - 'diagnostics/test_kn0010_recovery_metrics.py'
      - 'run-r13-kn0010-owner-nomass-extrap-trigger.txt'

permissions:
  contents: read
  actions: read

jobs:
  static-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install MPI HDF5 build and analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake make openmpi-bin libopenmpi-dev libhdf5-openmpi-dev unzip zip python3-h5py python3-numpy

      - name: Run metric and variant static tests
        run: |
          set -euxo pipefail
          python3 -m py_compile \
            diagnostics/analyze_kn0010_recovery_variant.py \
            diagnostics/patch_r13_kn0010_recovery_variants.py \
            diagnostics/test_kn0010_recovery_metrics.py
          python3 diagnostics/test_kn0010_recovery_metrics.py
          python3 - <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/run-rana2013-r13-benchmark.yml')
          text=p.read_text()
          core=text[text.index('  paper-core:'):text.index('  paper-grid-study:')]
          grid=text[text.index('  paper-grid-study:'):]
          hard_hold='if: $'+'{{ false }}'
          assert hard_hold in core, 'paper-core hold changed'
          assert hard_hold in grid, 'paper-grid-study hold changed'
          print('HARD_HOLDS_PRESERVED')
          PY

      - name: Download audited paper-equation R13 source
        uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          run-id: 29673135273
          github-token: ${{ github.token }}
          path: audited

      - name: Patch and build minimal owner/no-mass extrapolation
        run: |
          set -euxo pipefail
          cp -a audited/astr ./astr
          rm -rf astr/build
          python3 diagnostics/patch_r13_kn0010_recovery_variants.py astr \
            --variant owner_nomass_extrap \
            --report patch_owner_nomass_extrap.json 2>&1 | tee patch_owner_nomass_extrap.log
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('patch_owner_nomass_extrap.json').read_text())
          assert d['all_passed'] is True,d
          assert d['config']=={
            'owner':True,'mass':False,'extrap':True,
            'zero_top_corner':False,'alternating':False,
          },d
          assert d['checks']['mass_constraint'] is True,d
          assert d['checks']['extrapolation'] is True,d
          assert d['checks']['corner_owner'] is True,d
          assert d['checks']['zero_top_corner'] is True,d
          assert d['checks']['alternating_order'] is True,d
          PY
          cmake -S astr -B astr/build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=OFF \
            '-DCMAKE_Fortran_FLAGS=-ffpe-trap=invalid -fbacktrace -g' 2>&1 | tee cmake_owner_nomass_extrap.log
          cmake --build astr/build --verbose -j 2 2>&1 | tee build_owner_nomass_extrap.log
          test -x astr/build/bin/astr

      - name: Generate and run fresh 10-step smoke
        env:
          WALLCLOCK_MINUTES: 45
          GFORTRAN_ERROR_BACKTRACE: '1'
        run: |
          set -euxo pipefail
          python3 audited/rana2013_r13/make_rana2013_case.py \
            --template-case audited/template_case \
            --output smoke_case \
            --paper-kn 0.010 \
            --grid-points 75 \
            --maxstep 10 \
            --dt 1.0e-5 \
            --checkpoint-every 10
          python3 - <<'PY'
          from pathlib import Path
          inp=next(Path('smoke_case/datin').glob('input.astr*'))
          lines=inp.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# nondimen,diffterm,lfilter'):
                  vals=[x.strip() for x in lines[i+1].split(',')]
                  vals[2]='f'; lines[i+1]=','.join(vals); break
          else: raise RuntimeError('lfilter line not found')
          inp.write_text('\n'.join(lines)+'\n')
          PY
          bash audited/rana2013_r13/run_rana2013_case.sh \
            "$PWD/smoke_case" \
            "$PWD/astr/build/bin/astr" \
            "$PWD/audited/rana2013_r13/rana2013_reference.json" 2>&1 | tee smoke_wrapper.log

      - name: Validate smoke endpoint
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json,re,h5py,numpy as np
          status=json.loads(Path('smoke_case/analysis/run_status.json').read_text())
          assert int(status.get('last_checkpoint_step') or 0)==10,status
          assert int(status.get('return_code') or 0)==0,status
          log=Path('smoke_case/logs/astr.log').read_text(errors='replace')
          markers={m:len(re.findall(m,log,re.I)) for m in [
            'RANA_P_FAILURE','SIGSEGV','SIGFPE','IEEE_INVALID_FLAG',
            'Floating-point exception','COMPUTATION CRASHED','NaN','Infinity',
          ]}
          assert all(v==0 for v in markers.values()),markers
          with h5py.File('smoke_case/outdat/flowfield.h5','r') as h:
              assert int(np.asarray(h['nstep']).reshape(-1)[0])==10
              bad=[]
              def visit(name,obj):
                  if isinstance(obj,h5py.Dataset) and obj.dtype.kind in 'fc' and not np.isfinite(obj[...]).all(): bad.append(name)
              h.visititems(visit); assert not bad,bad
              for k in ('ro','p','t'): assert float(np.min(np.asarray(h[k],float)))>0,k
          Path('smoke_verdict.json').write_text(json.dumps({
            'passed':True,'step':10,'markers':markers,
            'scope':'infrastructure and short-time stability only',
          },indent=2)+'\n')
          PY

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: R13_KN0010_OWNER_NOMASS_EXTRAP_SMOKE
          path: |
            patch_owner_nomass_extrap.json
            patch_owner_nomass_extrap.log
            cmake_owner_nomass_extrap.log
            build_owner_nomass_extrap.log
            smoke_wrapper.log
            smoke_verdict.json
            smoke_case/analysis/run_status.json
            smoke_case/outdat/flowfield.h5
          retention-days: 14

  fresh-30k-diagnostic:
    needs: static-build-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install MPI HDF5 build and analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake make openmpi-bin libopenmpi-dev libhdf5-openmpi-dev unzip zip python3-h5py python3-numpy

      - name: Download audited paper-equation R13 source
        uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          run-id: 29673135273
          github-token: ${{ github.token }}
          path: audited

      - name: Patch and build owner/no-mass extrapolation
        run: |
          set -euxo pipefail
          cp -a audited/astr ./astr
          rm -rf astr/build
          python3 diagnostics/patch_r13_kn0010_recovery_variants.py astr \
            --variant owner_nomass_extrap \
            --report patch_owner_nomass_extrap.json 2>&1 | tee patch_owner_nomass_extrap.log
          cmake -S astr -B astr/build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=OFF \
            '-DCMAKE_Fortran_FLAGS=-ffpe-trap=invalid -fbacktrace -g' 2>&1 | tee cmake_owner_nomass_extrap.log
          cmake --build astr/build --verbose -j 2 2>&1 | tee build_owner_nomass_extrap.log
          test -x astr/build/bin/astr

      - name: Generate identical fresh Rana Kn 0.010 case
        run: |
          set -euxo pipefail
          python3 audited/rana2013_r13/make_rana2013_case.py \
            --template-case audited/template_case \
            --output case \
            --paper-kn 0.010 \
            --grid-points 75 \
            --maxstep 30000 \
            --dt 1.0e-5 \
            --checkpoint-every 1000
          python3 - <<'PY'
          from pathlib import Path
          import json
          inp=next(Path('case/datin').glob('input.astr*'))
          lines=inp.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# nondimen,diffterm,lfilter'):
                  vals=[x.strip() for x in lines[i+1].split(',')]
                  vals[2]='f'; lines[i+1]=','.join(vals); break
          else: raise RuntimeError('lfilter line not found')
          inp.write_text('\n'.join(lines)+'\n')
          p=Path('case/rana2013_case_metadata.json'); meta=json.loads(p.read_text())
          meta.update({
            'variant':'owner_nomass_extrap','filter_enabled':False,
            'target_step':30000,
            'comparison_purpose':'minimal controlled wall-face stability diagnostic',
            'mass_rescaling':False,'zero_corner_override':False,
            'alternating_wall_order':False,
            'corner_discretization_warning':'Not the exact coupled Rana Eq.(20) matrix solve.',
          })
          p.write_text(json.dumps(meta,indent=2)+'\n')
          PY

      - name: Run fresh 0 to 30k diagnostic
        id: solve
        continue-on-error: true
        env:
          WALLCLOCK_MINUTES: 320
          GFORTRAN_ERROR_BACKTRACE: '1'
        run: |
          bash audited/rana2013_r13/run_rana2013_case.sh \
            "$PWD/case" \
            "$PWD/astr/build/bin/astr" \
            "$PWD/audited/rana2013_r13/rana2013_reference.json"

      - name: Build corrected independent D G and convergence verdict
        if: always()
        run: |
          set +e
          python3 diagnostics/analyze_kn0010_recovery_variant.py \
            --case case \
            --variant owner_nomass_extrap \
            --target 30000 \
            --output recovery_verdict_owner_nomass_extrap.json
          echo $? > analysis_rc.txt
          set -e

      - name: Package complete evidence
        if: always()
        run: |
          ROOT=R13_KN0010_RECOVERY_owner_nomass_extrap
          mkdir -p "$ROOT"
          cp -a case "$ROOT/" || true
          cp -a patch_owner_nomass_extrap.json patch_owner_nomass_extrap.log \
            cmake_owner_nomass_extrap.log build_owner_nomass_extrap.log \
            recovery_verdict_owner_nomass_extrap.json analysis_rc.txt "$ROOT/" || true
          cp -a astr/src/methodmoment.F90 astr/src/bc.F90 astr/src/fludyna.F90 \
            astr/src/mainloop.F90 astr/src/parallel.F90 "$ROOT/" || true
          sha256sum "$ROOT"/*.F90 > "$ROOT/source_sha256.txt" || true
          zip -r -6 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: R13_KN0010_RECOVERY_owner_nomass_extrap
          path: |
            R13_KN0010_RECOVERY_owner_nomass_extrap.zip
            R13_KN0010_RECOVERY_owner_nomass_extrap.zip.sha256
          retention-days: 14
          compression-level: 0

      - name: Clean diagnostic gate (not a convergence gate)
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          assert Path('analysis_rc.txt').read_text().strip()=='0'
          p=Path('recovery_verdict_owner_nomass_extrap.json')
          assert p.exists(),'missing independent verdict'
          d=json.loads(p.read_text()); print(json.dumps(d,indent=2))
          assert d['completed_cleanly'] is True,d
          assert d['publication_grade'] is False,d
          assert d['variant']=='owner_nomass_extrap',d
          PY
