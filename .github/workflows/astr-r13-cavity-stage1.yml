name: ASTR R13 cavity stage 1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'astr-r13-stage1-trigger.txt'

permissions:
  contents: read

jobs:
  build-discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install compilers and libraries
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran cmake make ninja-build git zip \
            openmpi-bin libopenmpi-dev \
            libhdf5-openmpi-dev hdf5-tools \
            python3 python3-numpy python3-matplotlib

      - name: Clone ASTR mom_merge and inspect cavity case
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf work artifact
          mkdir -p work artifact/logs artifact/discovery
          git clone --depth 1 --branch mom_merge https://github.com/astr-code/astr.git work/astr
          cd work/astr
          git rev-parse HEAD | tee ../../artifact/ASTR_MOM_MERGE_COMMIT.txt
          git status --short --branch | tee ../../artifact/logs/git_status.txt
          find examples/Lid-Driven-Cavity-Rarefied -maxdepth 5 -type f -printf '%P\n' | sort | tee ../../artifact/discovery/cavity_file_list.txt
          find examples/Lid-Driven-Cavity-Rarefied -maxdepth 5 -type f \( -iname 'input*' -o -iname '*.dat' -o -iname '*.i3d' -o -iname '*.txt' \) -print | sort > ../../artifact/discovery/candidate_inputs.txt
          while IFS= read -r f; do
            printf '\n===== %s =====\n' "$f"
            sed -n '1,260p' "$f" || true
          done < ../../artifact/discovery/candidate_inputs.txt > ../../artifact/discovery/candidate_inputs_contents.txt
          cd ../..
          cp -a work/astr artifact/ASTR_mom_merge_source
          rm -rf artifact/ASTR_mom_merge_source/.git

      - name: Configure and build ASTR
        shell: bash
        run: |
          set +e
          mkdir -p work/build
          cd work/build
          cmake -G Ninja ../astr \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=mpifort \
            -DBUILD_TESTING=OFF \
            2>&1 | tee ../../artifact/logs/cmake_configure.log
          cfg=${PIPESTATUS[0]}
          if [ "$cfg" -eq 0 ]; then
            cmake --build . --parallel 2 2>&1 | tee ../../artifact/logs/build.log
            bld=${PIPESTATUS[0]}
          else
            bld=99
          fi
          printf 'configure_exit=%s\nbuild_exit=%s\n' "$cfg" "$bld" | tee ../../artifact/BUILD_STATUS.txt
          find . -type f -perm -111 -printf '%p\n' | sort | tee ../../artifact/discovery/executables.txt
          if [ "$bld" -eq 0 ]; then
            cmake --install . 2>&1 | tee ../../artifact/logs/install.log
            find ../astr -type f -perm -111 -printf '%p\n' | sort | tee ../../artifact/discovery/source_tree_executables_after_install.txt
          fi
          exit 0

      - name: Package stage-1 bundle
        shell: bash
        run: |
          set -euxo pipefail
          cp -a work/build artifact/build_tree || true
          rm -rf artifact/build_tree/CMakeFiles artifact/build_tree/_deps || true
          zip -r -9 ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY.zip artifact
          sha256sum ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY.zip > ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY.zip.sha256

      - name: Upload stage-1 results
        uses: actions/upload-artifact@v4
        with:
          name: ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY
          path: |
            ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY.zip
            ASTR_R13_CAVITY_STAGE1_SOURCE_BUILD_DISCOVERY.zip.sha256
          compression-level: 0
          retention-days: 7
