name: Resume audited full-bulk ASTR R26 from 70k to 100k

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'run-r26-full-bulk-100k-trigger.txt'

permissions:
  contents: read
  actions: read

concurrency:
  group: astr-r26-full-bulk-100k-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resume-r26-70k-to-84k:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler and analysis libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran cmake make openmpi-bin libopenmpi-dev \
            libhdf5-openmpi-dev unzip zip \
            python3-h5py python3-numpy python3-scipy python3-matplotlib python3-pandas

      - name: Download verified ASTR source bundle
        uses: actions/download-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005
          run-id: 29624062741
          github-token: ${{ github.token }}
          path: source_artifact

      - name: Download validated partial full-bulk R26 artifact
        uses: actions/download-artifact@v4
        with:
          name: ASTR_R26_FULL_BULK_V2_RELAXED_WBC_50K_TO_100K
          run-id: 29662210452
          github-token: ${{ github.token }}
          path: partial_artifact

      - name: Restore source and last complete 70k checkpoint
        shell: bash
        run: |
          set -euxo pipefail
          SOURCE_INNER=$(find source_artifact -type f -name 'ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005.zip' -print -quit)
          test -n "$SOURCE_INNER"
          mkdir source_restored
          unzip -q "$SOURCE_INNER" -d source_restored
          cp -a source_restored/astr ./astr
          rm -rf astr/build

          PARTIAL_INNER=$(find partial_artifact -type f -name 'ASTR_R26_FULL_BULK_V2_RELAXED_WBC_50K_TO_100K.zip' -print -quit)
          test -n "$PARTIAL_INNER"
          PARTIAL_SHA="${PARTIAL_INNER}.sha256"
          test -f "$PARTIAL_SHA"
          (cd "$(dirname "$PARTIAL_INNER")" && sha256sum -c "$(basename "$PARTIAL_SHA")")
          mkdir partial_restored
          unzip -q "$PARTIAL_INNER" -d partial_restored
          BASE_ROOT=$(find partial_restored -type d -name 'ASTR_R26_FULL_BULK_V2_RELAXED_WBC_50K_TO_100K' -print -quit)
          test -n "$BASE_ROOT"
          echo "$BASE_ROOT" > base_root.txt

          cp -a "$BASE_ROOT/final_case" ./r26_case
          mkdir -p r26_case/outdat r26_case/bakup
          cp "$BASE_ROOT/checkpoints/step_070000/flowfield.h5" r26_case/outdat/flowfield.h5
          cp "$BASE_ROOT/checkpoints/step_070000/auxiliary.h5" r26_case/outdat/auxiliary.h5
          cp "$BASE_ROOT/checkpoints/step_070000/flowfield.h5" r26_case/bakup/flowfield.h5
          cp "$BASE_ROOT/checkpoints/step_070000/auxiliary.h5" r26_case/bakup/auxiliary.h5

          cp -a "$BASE_ROOT/checkpoints" ./checkpoints
          cp -a "$BASE_ROOT/convergence" ./convergence
          cp -a "$BASE_ROOT/summaries" ./summaries
          cp -a "$BASE_ROOT/logs" ./logs
          cp -a "$BASE_ROOT/audits" ./audits
          cp -a "$BASE_ROOT/patches" ./patches

          python3 - <<'PY'
          from pathlib import Path
          import h5py, json, numpy as np
          root=Path(Path('base_root.txt').read_text().strip())
          required=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          with h5py.File('r26_case/outdat/flowfield.h5','r') as h:
              assert int(np.asarray(h['nstep']).ravel()[0]) == 70000
              for key in required:
                  assert key in h and np.isfinite(np.asarray(h[key])).all(), key
          audit=json.loads((root/'audits/r26_gu_emerson_formula_audit.json').read_text())
          assert audit['all_required_bulk_checks_passed'] is True
          assert audit['static_checks']['wbc_relaxation_retained'] is True
          p=next(Path('r26_case/datin').glob('input.astr*'))
          lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# lrestar'):
                  lines[i+1]='t'
                  break
          else:
              raise RuntimeError('lrestar entry not found')
          p.write_text('\n'.join(lines)+'\n')
          PY

      - name: Rebuild the identical audited formula path
        shell: bash
        run: |
          set -euxo pipefail
          BASE_ROOT=$(cat base_root.txt)
          mkdir -p resume_audits
          python3 astr_r26_stage1/patch_r26_stage1.py astr \
            --report resume_audits/r26_stage1_source_audit.json \
            --patch-output resume_audits/ASTR_R26_STAGE1.patch
          python3 astr_r26_stage2/patch_r26_nonlinear_sources.py astr \
            --report resume_audits/r26_nonlinear_source_v1_audit.json \
            --patch-output resume_audits/ASTR_R26_NONLINEAR_SOURCE_V1.patch
          patch astr/src/methodmoment.F90 < astr_r26_stage3/R26_FULL_BULK_CLOSURE_V2.patch
          cmp astr/src/methodmoment.F90 "$BASE_ROOT/patched_source_src/methodmoment.F90"
          sha256sum astr/src/methodmoment.F90 "$BASE_ROOT/patched_source_src/methodmoment.F90" | tee resume_audits/patched_methodmoment_sha256.txt
          cp -a resume_audits/. audits/
          cmake -S astr -B astr/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build astr/build -j 2
          test -x astr/build/bin/astr

      - name: Continue full-bulk R26 from 70k to 84k by 2k
        shell: bash
        run: |
          set -euxo pipefail
          INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          PREVIOUS=70000
          for TARGET in $(seq 72000 2000 84000); do
            python3 - "$TARGET" <<'PY'
          import sys
          from pathlib import Path
          target=int(sys.argv[1])
          p=Path('r26_case/datin/controller')
          lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# maxstep,feqchkpt'):
                  lines[i+1]=f"{target:9d},    2000,    2000,     500,     200,   200"
                  break
          else:
              raise RuntimeError('controller maxstep entry not found')
          p.write_text('\n'.join(lines)+'\n')
          PY
            LABEL=$(printf 'step_%06d' "$TARGET")
            PREV_LABEL=$(printf 'step_%06d' "$PREVIOUS")
            (cd r26_case && /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > "../logs/${LABEL}.log" 2> "../logs/${LABEL}_time.log")
            ! grep -q 'COMPUTATION CRASHED' "logs/${LABEL}.log"
            python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step "$TARGET" --output "summaries/${LABEL}.json"
            python3 astr_r26_stage2/checkpoint_convergence.py \
              --previous "checkpoints/${PREV_LABEL}/flowfield.h5" \
              --current r26_case/outdat/flowfield.h5 \
              --output "convergence/${PREV_LABEL}_to_${LABEL}.json"
            rm -rf "checkpoints/${LABEL}"
            mkdir "checkpoints/${LABEL}"
            cp r26_case/outdat/flowfield.h5 r26_case/outdat/auxiliary.h5 "checkpoints/${LABEL}/"
            PREVIOUS=$TARGET
          done

      - name: Package 84k handoff
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          ROOT=ASTR_R26_FULL_BULK_RESUME_70K_TO_84K
          mkdir -p "$ROOT/code"
          cp -a checkpoints convergence summaries logs audits patches "$ROOT/" || true
          cp -a r26_case "$ROOT/final_case" || true
          cp -a astr/src "$ROOT/patched_source_src" || true
          cp -a astr_r26_stage1 astr_r26_stage2 astr_r26_stage3 "$ROOT/code/" || true
          python3 - <<'PY'
          from pathlib import Path
          import json
          summary={
            'source_run':29662210452,
            'restart_checkpoint':70000,
            'target_checkpoint':84000,
            'repair_reason':'Original single job reached the GitHub-hosted runner six-hour limit while advancing toward step 72000.',
            'formula_change_in_repair':False,
            'restart_policy':'Discard interrupted 72k segment and restart from the last fully validated step-70000 HDF5 checkpoint.'
          }
          Path('ASTR_R26_FULL_BULK_RESUME_70K_TO_84K/audits/resume_70k_to_84k_summary.json').write_text(json.dumps(summary,indent=2))
          PY
          zip -r -9 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"
          test -s "${ROOT}.zip"

      - name: Upload 84k handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ASTR_R26_FULL_BULK_RESUME_70K_TO_84K
          path: |
            ASTR_R26_FULL_BULK_RESUME_70K_TO_84K.zip
            ASTR_R26_FULL_BULK_RESUME_70K_TO_84K.zip.sha256
          compression-level: 0
          retention-days: 7

  resume-r26-84k-to-100k:
    needs: resume-r26-70k-to-84k
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler and analysis libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran cmake make openmpi-bin libopenmpi-dev \
            libhdf5-openmpi-dev unzip zip \
            python3-h5py python3-numpy python3-scipy python3-matplotlib python3-pandas

      - name: Download verified ASTR source bundle
        uses: actions/download-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005
          run-id: 29624062741
          github-token: ${{ github.token }}
          path: source_artifact

      - name: Download 84k handoff from this workflow
        uses: actions/download-artifact@v4
        with:
          name: ASTR_R26_FULL_BULK_RESUME_70K_TO_84K
          path: stage1_artifact

      - name: Download completed corrected R13 reference
        uses: actions/download-artifact@v4
        with:
          name: ASTR_R13_CORRECTED_DELTA_40K_TO_100K
          run-id: 29662226112
          github-token: ${{ github.token }}
          path: r13_artifact

      - name: Restore source, R26 84k handoff, and corrected R13 reference
        shell: bash
        run: |
          set -euxo pipefail
          SOURCE_INNER=$(find source_artifact -type f -name 'ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005.zip' -print -quit)
          test -n "$SOURCE_INNER"
          mkdir source_restored
          unzip -q "$SOURCE_INNER" -d source_restored
          cp -a source_restored/astr ./astr
          rm -rf astr/build

          STAGE1_INNER=$(find stage1_artifact -type f -name 'ASTR_R26_FULL_BULK_RESUME_70K_TO_84K.zip' -print -quit)
          test -n "$STAGE1_INNER"
          STAGE1_SHA="${STAGE1_INNER}.sha256"
          (cd "$(dirname "$STAGE1_INNER")" && sha256sum -c "$(basename "$STAGE1_SHA")")
          mkdir stage1_restored
          unzip -q "$STAGE1_INNER" -d stage1_restored
          BASE_ROOT=$(find stage1_restored -type d -name 'ASTR_R26_FULL_BULK_RESUME_70K_TO_84K' -print -quit)
          test -n "$BASE_ROOT"
          echo "$BASE_ROOT" > base_root.txt
          cp -a "$BASE_ROOT/final_case" ./r26_case
          cp "$BASE_ROOT/checkpoints/step_084000/flowfield.h5" r26_case/outdat/flowfield.h5
          cp "$BASE_ROOT/checkpoints/step_084000/auxiliary.h5" r26_case/outdat/auxiliary.h5
          cp "$BASE_ROOT/checkpoints/step_084000/flowfield.h5" r26_case/bakup/flowfield.h5
          cp "$BASE_ROOT/checkpoints/step_084000/auxiliary.h5" r26_case/bakup/auxiliary.h5
          cp -a "$BASE_ROOT/checkpoints" ./checkpoints
          cp -a "$BASE_ROOT/convergence" ./convergence
          cp -a "$BASE_ROOT/summaries" ./summaries
          cp -a "$BASE_ROOT/logs" ./logs
          cp -a "$BASE_ROOT/audits" ./audits
          cp -a "$BASE_ROOT/patches" ./patches

          R13_INNER=$(find r13_artifact -type f -name 'ASTR_R13_CORRECTED_DELTA_40K_TO_100K.zip' -print -quit)
          test -n "$R13_INNER"
          R13_SHA="${R13_INNER}.sha256"
          (cd "$(dirname "$R13_INNER")" && sha256sum -c "$(basename "$R13_SHA")")
          mkdir r13_restored
          unzip -q "$R13_INNER" -d r13_restored
          R13_ROOT=$(find r13_restored -type d -name 'ASTR_R13_CORRECTED_DELTA_40K_TO_100K' -print -quit)
          test -n "$R13_ROOT"
          echo "$R13_ROOT" > r13_root.txt

          python3 - <<'PY'
          from pathlib import Path
          import h5py, numpy as np
          required=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          with h5py.File('r26_case/outdat/flowfield.h5','r') as h:
              assert int(np.asarray(h['nstep']).ravel()[0]) == 84000
              for key in required:
                  assert key in h and np.isfinite(np.asarray(h[key])).all(), key
          p=next(Path('r26_case/datin').glob('input.astr*'))
          lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# lrestar'):
                  lines[i+1]='t'
                  break
          else:
              raise RuntimeError('lrestar entry not found')
          p.write_text('\n'.join(lines)+'\n')
          PY

      - name: Rebuild and verify identical patched source
        shell: bash
        run: |
          set -euxo pipefail
          BASE_ROOT=$(cat base_root.txt)
          mkdir -p resume_audits
          python3 astr_r26_stage1/patch_r26_stage1.py astr \
            --report resume_audits/r26_stage1_source_audit.json \
            --patch-output resume_audits/ASTR_R26_STAGE1.patch
          python3 astr_r26_stage2/patch_r26_nonlinear_sources.py astr \
            --report resume_audits/r26_nonlinear_source_v1_audit.json \
            --patch-output resume_audits/ASTR_R26_NONLINEAR_SOURCE_V1.patch
          patch astr/src/methodmoment.F90 < astr_r26_stage3/R26_FULL_BULK_CLOSURE_V2.patch
          cmp astr/src/methodmoment.F90 "$BASE_ROOT/patched_source_src/methodmoment.F90"
          sha256sum astr/src/methodmoment.F90 "$BASE_ROOT/patched_source_src/methodmoment.F90" | tee resume_audits/patched_methodmoment_sha256.txt
          cp -a resume_audits/. audits/
          cmake -S astr -B astr/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build astr/build -j 2
          test -x astr/build/bin/astr

      - name: Continue full-bulk R26 from 84k to 100k by 2k
        shell: bash
        run: |
          set -euxo pipefail
          INPUT=$(basename "$(find r26_case/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          PREVIOUS=84000
          for TARGET in $(seq 86000 2000 100000); do
            python3 - "$TARGET" <<'PY'
          import sys
          from pathlib import Path
          target=int(sys.argv[1])
          p=Path('r26_case/datin/controller')
          lines=p.read_text().splitlines()
          for i,line in enumerate(lines):
              if line.strip().startswith('# maxstep,feqchkpt'):
                  lines[i+1]=f"{target:9d},    2000,    2000,     500,     200,   200"
                  break
          else:
              raise RuntimeError('controller maxstep entry not found')
          p.write_text('\n'.join(lines)+'\n')
          PY
            LABEL=$(printf 'step_%06d' "$TARGET")
            PREV_LABEL=$(printf 'step_%06d' "$PREVIOUS")
            (cd r26_case && /usr/bin/time -v mpirun --oversubscribe -np 4 ../astr/build/bin/astr run "datin/${INPUT}" > "../logs/${LABEL}.log" 2> "../logs/${LABEL}_time.log")
            ! grep -q 'COMPUTATION CRASHED' "logs/${LABEL}.log"
            python3 astr_r26_stage1/validate_r26_case.py r26_case --target-step "$TARGET" --output "summaries/${LABEL}.json"
            python3 astr_r26_stage2/checkpoint_convergence.py \
              --previous "checkpoints/${PREV_LABEL}/flowfield.h5" \
              --current r26_case/outdat/flowfield.h5 \
              --output "convergence/${PREV_LABEL}_to_${LABEL}.json"
            rm -rf "checkpoints/${LABEL}"
            mkdir "checkpoints/${LABEL}"
            cp r26_case/outdat/flowfield.h5 r26_case/outdat/auxiliary.h5 "checkpoints/${LABEL}/"
            PREVIOUS=$TARGET
          done

      - name: Build matched 60k 80k and 100k R13 R26 DSMC comparisons
        shell: bash
        run: |
          set -euxo pipefail
          R13_ROOT=$(cat r13_root.txt)
          mkdir -p comparison
          for STEP in 60000 80000 100000; do
            LABEL=$(printf 'step_%06d' "$STEP")
            R26_CASE="comparison/r26_case_${LABEL}"
            R13_CASE="comparison/r13_case_${LABEL}"
            cp -a r26_case "$R26_CASE"
            cp "checkpoints/${LABEL}/flowfield.h5" "$R26_CASE/outdat/flowfield.h5"
            cp "checkpoints/${LABEL}/auxiliary.h5" "$R26_CASE/outdat/auxiliary.h5"
            cp -a "$R13_ROOT/final_case" "$R13_CASE"
            cp "$R13_ROOT/checkpoints/${LABEL}/flowfield.h5" "$R13_CASE/outdat/flowfield.h5"
            cp "$R13_ROOT/checkpoints/${LABEL}/auxiliary.h5" "$R13_CASE/outdat/auxiliary.h5"
            python3 astr_r26_stage1/compare_r26_r13_dsmc.py \
              --r26-case "$R26_CASE" --r13-case "$R13_CASE" --output "comparison/${LABEL}"
          done

      - name: Validate all checkpoints and quantify convergence
        shell: bash
        run: |
          set -euxo pipefail
          R13_ROOT=$(cat r13_root.txt)
          mkdir -p validation r13_reference
          python3 - "$R13_ROOT" <<'PY'
          from pathlib import Path
          import csv, h5py, json, numpy as np, sys

          r26=Path('checkpoints')
          r13=Path(sys.argv[1])/'checkpoints'
          required=['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']

          def validate(root: Path):
              rows=[]
              for d in sorted(root.glob('step_*')):
                  expected=int(d.name.split('_')[1])
                  fp=d/'flowfield.h5'; ap=d/'auxiliary.h5'
                  with h5py.File(fp,'r') as h:
                      actual=int(np.asarray(h['nstep']).ravel()[0])
                      bad=[]
                      for key in required:
                          if key not in h or not np.isfinite(np.asarray(h[key])).all(): bad.append(key)
                  rows.append({'step':expected,'actual_step':actual,'auxiliary_exists':ap.exists(),'bad_fields':bad})
              ok=all(x['step']==x['actual_step'] and x['auxiliary_exists'] and not x['bad_fields'] for x in rows)
              return {'ok':ok,'count':len(rows),'first_step':rows[0]['step'],'last_step':rows[-1]['step'],'rows':rows}

          def load(root: Path, step: int):
              with h5py.File(root/f'step_{step:06d}'/'flowfield.h5','r') as h:
                  return {k:np.asarray(h[k],dtype=float) for k in required}

          def rel_vec(a,b,keys):
              num=sum(np.mean((b[k]-a[k])**2) for k in keys)
              den=sum(np.mean(b[k]**2) for k in keys)
              return float(100*np.sqrt(num)/(np.sqrt(den)+1e-30))

          field_conv=[]
          for a_step,b_step in [(60000,80000),(80000,100000)]:
              a=load(r26,a_step); b=load(r26,b_step)
              field_conv.append({
                  'from_step':a_step,'to_step':b_step,
                  'q_relative_RMS_change_percent':rel_vec(a,b,['qx','qy']),
                  'Rij_relative_RMS_change_percent':rel_vec(a,b,['Rxx','Rxy','Ryy']),
                  'Delta_relative_RMS_change_percent':rel_vec(a,b,['Delta'])
              })

          metrics=['f_AF_active','mean_IAF_AF','PDelta_over_PR','mean_chiDelta']
          matched=[]
          summaries={}
          for step in [60000,80000,100000]:
              d=json.loads((Path(f'comparison/step_{step:06d}/comparison_summary.json')).read_text())
              summaries[step]=d
              row={'step':step}
              for model in ['R13','R26']:
                  for m in metrics: row[f'{model}_{m}']=float(d[model][m])
              for m in metrics: row[f'DSMC_{m}']=float(d['DSMC'][m])
              matched.append(row)

          metric_conv=[]
          for a_step,b_step in [(60000,80000),(80000,100000)]:
              row={'from_step':a_step,'to_step':b_step}
              for model in ['R13','R26']:
                  for m in metrics:
                      av=float(summaries[a_step][model][m]); bv=float(summaries[b_step][model][m])
                      row[f'{model}_{m}_relative_change_percent']=100*(bv-av)/(abs(bv)+1e-30)
              metric_conv.append(row)

          formula=json.loads(Path('audits/r26_gu_emerson_formula_audit.json').read_text())
          final={
              'r26_hdf5_validation':validate(r26),
              'r13_hdf5_validation':validate(r13),
              'formula_audit':formula,
              'matched_checkpoints':[60000,80000,100000],
              'comparison_method':{
                  'interpolation_grid':'160x160 cell-centered',
                  'smoothing':'7-point uniform filter',
                  'activity_threshold_fraction':0.05
              },
              'field_convergence':field_conv,
              'matched_metrics':matched,
              'metric_convergence':metric_conv,
              'remaining_wall_boundary_limitation':formula['boundary_status'],
              'restart_caveats':[
                  'R26 restarts from a 50k nonlinear-source state after the full-bulk equations were changed; restart-independence remains unverified.',
                  'The corrected R13 continuation starts from a 40k seed generated before the dqz correction; restart-independence remains unverified.'
              ]
          }
          assert final['r26_hdf5_validation']['ok']
          assert final['r13_hdf5_validation']['ok']
          assert formula['all_required_bulk_checks_passed']
          Path('validation/dual_path_final_validation.json').write_text(json.dumps(final,indent=2))

          with open('validation/matched_metrics_60k_80k_100k.csv','w',newline='') as f:
              w=csv.DictWriter(f,fieldnames=list(matched[0])); w.writeheader(); w.writerows(matched)
          with open('validation/field_convergence_60k_80k_100k.csv','w',newline='') as f:
              w=csv.DictWriter(f,fieldnames=list(field_conv[0])); w.writeheader(); w.writerows(field_conv)
          with open('validation/metric_convergence_60k_80k_100k.csv','w',newline='') as f:
              w=csv.DictWriter(f,fieldnames=list(metric_conv[0])); w.writeheader(); w.writerows(metric_conv)
          print(json.dumps(final,indent=2))
          PY

          cp -a "$R13_ROOT/audits" r13_reference/
          cp -a "$R13_ROOT/convergence" r13_reference/
          mkdir -p r13_reference/checkpoints
          for STEP in 060000 080000 100000; do
            cp -a "$R13_ROOT/checkpoints/step_${STEP}" r13_reference/checkpoints/
          done

      - name: Package final resumed full-bulk R26 result
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          ROOT=ASTR_R26_FULL_BULK_V2_RELAXED_WBC_70K_TO_100K_RESUMED
          mkdir -p "$ROOT/code"
          cp -a checkpoints convergence summaries logs comparison audits patches validation r13_reference "$ROOT/" || true
          cp -a r26_case "$ROOT/final_case" || true
          cp -a astr/src "$ROOT/patched_source_src" || true
          cp -a astr_r26_stage1 astr_r26_stage2 astr_r26_stage3 "$ROOT/code/" || true
          zip -r -9 "${ROOT}.zip" "$ROOT"
