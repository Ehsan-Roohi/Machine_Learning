name: Run ASTR R26 Stage-1 short gates

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'run-astr-r26-stage1-trigger.txt'

permissions:
  contents: read
  actions: read

concurrency:
  group: astr-r26-stage1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  r26-short-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler and analysis libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran cmake make openmpi-bin libopenmpi-dev \
            libhdf5-openmpi-dev unzip zip \
            python3-h5py python3-numpy

      - name: Download verified ASTR source/input bundle
        uses: actions/download-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005
          run-id: 29624062741
          github-token: ${{ github.token }}
          path: source_artifact

      - name: Restore source and cavity template
        shell: bash
        run: |
          set -euxo pipefail
          INNER=$(find source_artifact -type f -name 'ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005.zip' -print -quit)
          test -n "$INNER"
          mkdir restored
          unzip -q "$INNER" -d restored
          test -d restored/astr
          test -d restored/case
          cp -a restored/astr ./astr
          cp -a restored/case ./template_case
          rm -rf astr/build
          git -C astr rev-parse HEAD > ASTR_UPSTREAM_COMMIT.txt || true

      - name: Apply audited Stage-1 patch
        shell: bash
        run: |
          set -euxo pipefail
          python3 astr_r26_stage1/patch_r26_stage1.py astr \
            --report r26_stage1_source_audit.json \
            --patch-output ASTR_R26_STAGE1.patch
          test -s ASTR_R26_STAGE1.patch
          grep -n 'Apsi1' astr/src/methodmoment.F90 | head -n 5
          ! grep -RniE 'uwall[[:space:]]*=[[:space:]]*dble\(nstep\)[[:space:]]*\*[[:space:]]*deltat' \
            astr/src/methodmoment.F90 astr/src/bc.F90

      - name: Build patched ASTR
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S astr -B astr/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build astr/build -j 2
          test -x astr/build/bin/astr

      - name: Prepare short-gate cases
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p cases summaries logs convergence

          python3 astr_r26_stage1/make_r26_cavity_case.py \
            --template-case template_case --output cases/u10_16_100 \
            --cells 16 --lid-speed-ms 10 --dt 1e-4 --maxstep 100 \
            --checkpoint-every 50

          python3 astr_r26_stage1/make_r26_cavity_case.py \
            --template-case template_case --output cases/u100_16_200 \
            --cells 16 --lid-speed-ms 100 --dt 2.5e-5 --maxstep 200 \
            --checkpoint-every 100

          python3 astr_r26_stage1/make_r26_cavity_case.py \
            --template-case template_case --output cases/u100_32_2000 \
            --cells 32 --lid-speed-ms 100 --dt 2.5e-5 --maxstep 2000 \
            --checkpoint-every 500

          for C in u10_16_100 u100_16_200 u100_32_2000; do
            echo "===== ${C} INPUT ====="
            grep -A1 -E '# ref_t,reynolds,mach,gamma|# turbmode,iomode, moment' "cases/${C}/datin/"input.astr*
            echo "===== ${C} CONTROLLER ====="
            grep -A1 -E '# maxstep|# deltat' "cases/${C}/datin/controller"
            ! grep -REn '[0-9][eE][+-][0-9]+' "cases/${C}/datin/"input.astr* "cases/${C}/datin/controller"
          done

      - name: Run R26 10 m/s 16x16 100-step smoke
        shell: bash
        run: |
          set -euxo pipefail
          INPUT=$(basename "$(find cases/u10_16_100/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd cases/u10_16_100
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../../astr/build/bin/astr run "datin/${INPUT}" \
            > ../../logs/u10_16_100.log 2> ../../logs/u10_16_100_time.log
          cd ../..
          grep -E 'current time step|current CFL|Flow Parameters|26-moment|COMPUTATION CRASHED' logs/u10_16_100.log || true
          ! grep -q 'COMPUTATION CRASHED' logs/u10_16_100.log
          python3 astr_r26_stage1/validate_r26_case.py cases/u10_16_100 \
            --target-step 100 --output summaries/u10_16_100.json

      - name: Run R26 100 m/s 16x16 200-step smoke
        shell: bash
        run: |
          set -euxo pipefail
          INPUT=$(basename "$(find cases/u100_16_200/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd cases/u100_16_200
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../../astr/build/bin/astr run "datin/${INPUT}" \
            > ../../logs/u100_16_200.log 2> ../../logs/u100_16_200_time.log
          cd ../..
          grep -E 'current time step|current CFL|Flow Parameters|26-moment|COMPUTATION CRASHED' logs/u100_16_200.log || true
          ! grep -q 'COMPUTATION CRASHED' logs/u100_16_200.log
          python3 astr_r26_stage1/validate_r26_case.py cases/u100_16_200 \
            --target-step 200 --output summaries/u100_16_200.json

      - name: Run R26 100 m/s 32x32 2000-step stability gate
        shell: bash
        run: |
          set -euxo pipefail
          INPUT=$(basename "$(find cases/u100_32_2000/datin -maxdepth 1 -name 'input.astr*' -print -quit)")
          cd cases/u100_32_2000
          /usr/bin/time -v mpirun --oversubscribe -np 4 ../../astr/build/bin/astr run "datin/${INPUT}" \
            > ../../logs/u100_32_2000.log 2> ../../logs/u100_32_2000_time.log
          cd ../..
          grep -E 'current time step|current CFL|Flow Parameters|26-moment|COMPUTATION CRASHED' logs/u100_32_2000.log || true
          ! grep -q 'COMPUTATION CRASHED' logs/u100_32_2000.log
          python3 astr_r26_stage1/validate_r26_case.py cases/u100_32_2000 \
            --target-step 2000 --output summaries/u100_32_2000.json

      - name: Quantify short-gate convergence
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import h5py, json, numpy as np
          from pathlib import Path

          root = Path('cases/u100_32_2000')
          current = root/'outdat/flowfield.h5'
          previous = root/'bakup/flowfield.h5'
          fields = ['ro','p','t','u1','u2','qx','qy','Rxx','Rxy','Ryy','Delta']
          report = {'interpretation': 'Short stability gate only; not a steady-state claim.'}
          if previous.is_file():
              with h5py.File(previous,'r') as hp, h5py.File(current,'r') as hc:
                  report['previous_step'] = int(hp['nstep'][0])
                  report['current_step'] = int(hc['nstep'][0])
                  report['relative_RMS_change_percent'] = {}
                  for key in fields:
                      a=np.asarray(hp[key],dtype=float)
                      b=np.asarray(hc[key],dtype=float)
                      report['relative_RMS_change_percent'][key] = float(
                          100*np.sqrt(np.mean((b-a)**2))/(np.sqrt(np.mean(b*b))+1e-30)
                      )
          Path('convergence/u100_32_short_gate.json').write_text(json.dumps(report,indent=2))
          print(json.dumps(report,indent=2))
          PY

      - name: Package Stage-1 short-gate source and results
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          ROOT=ASTR_R26_STAGE1_SHORT_GATES_U100_KN005
          mkdir -p "$ROOT"
          cp -a astr_r26_stage1 "$ROOT/code"
          cp ASTR_UPSTREAM_COMMIT.txt ASTR_R26_STAGE1.patch r26_stage1_source_audit.json "$ROOT/" || true
          cp -a summaries logs convergence "$ROOT/" || true
          for C in u10_16_100 u100_16_200 u100_32_2000; do
            mkdir -p "$ROOT/cases/$C"
            cp -a "cases/$C/datin" "$ROOT/cases/$C/" || true
            cp -a "cases/$C/outdat" "$ROOT/cases/$C/" || true
            cp -a "cases/$C/bakup" "$ROOT/cases/$C/" || true
            cp "cases/$C/case_metadata.json" "$ROOT/cases/$C/" || true
          done
          cp -a astr/src "$ROOT/patched_source_src"
          zip -r -9 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"

      - name: Upload R26 Stage-1 short-gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ASTR_R26_STAGE1_SHORT_GATES_U100_KN005
          path: |
            ASTR_R26_STAGE1_SHORT_GATES_U100_KN005.zip
            ASTR_R26_STAGE1_SHORT_GATES_U100_KN005.zip.sha256
          compression-level: 0
          retention-days: 7
