name: Run R13 JFM cavity

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'r13-jfm-cavity-trigger.txt'

permissions:
  contents: read

jobs:
  run-r13:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Prepare work directory
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf r13_jfm_work
          mkdir -p r13_jfm_work
          cp ci_r13/input_jfm_kn005_u100.yml r13_jfm_work/
          cp ci_r13/run_and_postprocess.py r13_jfm_work/
          cp ci_r13/run_case.sh r13_jfm_work/
          chmod -R 777 r13_jfm_work

      - name: Run fenicsR13 in official container
        shell: bash
        run: |
          set -euxo pipefail
          docker pull registry.git.rwth-aachen.de/lamboo/fenicsr13:latest
          docker inspect registry.git.rwth-aachen.de/lamboo/fenicsr13:latest
          docker run --rm --shm-size=4g \
            --entrypoint /bin/bash \
            -v "$GITHUB_WORKSPACE/r13_jfm_work:/work" \
            -w /work \
            registry.git.rwth-aachen.de/lamboo/fenicsr13:latest \
            -lc 'bash /work/run_case.sh'
          sudo chown -R "$USER:$USER" r13_jfm_work || true
          test -s r13_jfm_work/output/run.log
          test -s r13_jfm_work/output/summary_all_meshes.json
          cd r13_jfm_work
          zip -r -9 R13_JFM_CAVITY_KN005_U100_RESULTS.zip output input_jfm_kn005_u100.yml run_and_postprocess.py run_case.sh
          test $(stat -c%s R13_JFM_CAVITY_KN005_U100_RESULTS.zip) -gt 10000

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: R13_JFM_CAVITY_KN005_U100_RESULTS
          path: r13_jfm_work/R13_JFM_CAVITY_KN005_U100_RESULTS.zip
          compression-level: 0
          retention-days: 7
