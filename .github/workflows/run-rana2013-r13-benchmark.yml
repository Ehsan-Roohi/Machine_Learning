name: Exact Rana 2013 nonlinear R13 benchmark suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'run-rana2013-r13-benchmark-trigger.txt'
      - 'rana2013_r13/**'
      - '.github/workflows/run-rana2013-r13-benchmark.yml'

permissions:
  contents: read
  actions: read

concurrency:
  group: rana2013-r13-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler, MPI, HDF5 and analysis packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake make openmpi-bin libopenmpi-dev libhdf5-openmpi-dev unzip zip python3-h5py python3-numpy python3-pandas python3-matplotlib
      - name: Download verified ASTR source and cavity template
        uses: actions/download-artifact@v4
        with:
          name: ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005
          run-id: 29624062741
          github-token: ${{ github.token }}
          path: source_artifact
      - name: Restore source and apply exact Rana equations
        shell: bash
        run: |
          set -euxo pipefail
          INNER=$(find source_artifact -type f -name 'ASTR_NONLINEAR_R13_JFM_CAVITY_U100_KN005.zip' -print -quit)
          mkdir restored
          unzip -q "$INNER" -d restored
          cp -a restored/astr ./astr
          cp -a restored/case ./template_case
          rm -rf astr/build
          mkdir -p audits patches
          python3 rana2013_r13/patch_rana2013_r13.py astr --report audits/formula_patch_report.json --patch-output patches/ASTR_RANA2013_R13_EXACT.patch
          python3 rana2013_r13/audit_rana2013_formulas.py astr --output audits/formula_oracle_report.json
      - name: Build exact Rana R13 source
        run: |
          cmake -S astr -B astr/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build astr/build -j 2
          test -x astr/build/bin/astr
      - name: Fresh equilibrium smoke gate
        shell: bash
        run: |
          set -uxo pipefail
          python3 rana2013_r13/make_rana2013_case.py --template-case template_case --output smoke_rana --paper-kn 0.0798 --grid-points 40 --maxstep 2000 --dt 1.0e-5 --checkpoint-every 500
          set +e
          (cd smoke_rana && mpirun --oversubscribe -np 4 ../astr/build/bin/astr run datin/input.astr_r13_jfm > smoke.log 2>&1)
          RUN_RC=$?
          set -e
          printf 'run_return_code=%s\n' "$RUN_RC" | tee smoke_rana/smoke_status.txt
          echo '===== smoke.log tail ====='
          tail -n 160 smoke_rana/smoke.log || true
          echo '===== produced files ====='
          find smoke_rana -maxdepth 3 -type f -printf '%p %s bytes\n' | sort || true
          if [[ -s smoke_rana/outdat/flowfield.h5 ]]; then
            set +e
            python3 rana2013_r13/analyze_rana2013_case.py smoke_rana --reference rana2013_r13/rana2013_reference.json --output-dir smoke_rana/analysis 2>&1 | tee smoke_rana/analyze.log
            ANALYZE_RC=${PIPESTATUS[0]}
            set -e
          else
            ANALYZE_RC=20
            echo 'flowfield.h5 was not produced' | tee smoke_rana/analyze.log
          fi
          printf 'analyze_return_code=%s\n' "$ANALYZE_RC" | tee -a smoke_rana/smoke_status.txt
          python3 - "$RUN_RC" "$ANALYZE_RC" <<'PY'
          import json,sys
          from pathlib import Path
          import h5py,numpy as np
          run_rc,analyze_rc=map(int,sys.argv[1:])
          errors=[]
          log=Path('smoke_rana/smoke.log').read_text(errors='replace') if Path('smoke_rana/smoke.log').exists() else ''
          if run_rc != 0: errors.append(f'mpirun return code {run_rc}')
          if 'COMPUTATION CRASHED' in log: errors.append('ASTR reported COMPUTATION CRASHED')
          if analyze_rc != 0: errors.append(f'analyzer return code {analyze_rc}')
          path=Path('smoke_rana/outdat/flowfield.h5')
          if not path.exists():
              errors.append('missing flowfield.h5')
          else:
              with h5py.File(path,'r') as h:
                  nstep=int(h['nstep'][0])
                  if nstep != 2000: errors.append(f'nstep={nstep}, expected 2000')
                  for k in ['ro','p','t','u1','u2','qx','qy','sigmaxy','Rxy','Delta']:
                      if k not in h: errors.append(f'missing dataset {k}'); continue
                      a=np.asarray(h[k]);
                      if not np.isfinite(a).all(): errors.append(f'non-finite {k}')
                  for k in ['ro','p','t']:
                      if k in h and np.min(h[k][...]) <= 0: errors.append(f'non-positive {k}')
          summary=Path('smoke_rana/analysis/rana2013_summary.json')
          if summary.exists():
              d=json.loads(summary.read_text())
              pmin=min(x['P_min'] for x in d['wall_equation_relative_residuals'].values())
              if pmin <= 0: errors.append(f'non-positive effective wall P: {pmin}')
          Path('smoke_rana/smoke_gate_report.json').write_text(json.dumps({'passed':not errors,'errors':errors},indent=2))
          print(json.dumps({'passed':not errors,'errors':errors},indent=2))
          if errors: raise SystemExit(2)
          PY
      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RANA2013_R13_SMOKE_DIAGNOSTICS
          path: |
            smoke_rana
            audits
            patches
          compression-level: 6
          retention-days: 14
      - name: Package audited executable and source with preserved layout
        run: |
          set -euxo pipefail
          PKG=ASTR_RANA2013_R13_AUDITED
          mkdir -p "$PKG/smoke_validation"
          cp -a astr "$PKG/"
          install -m 0755 astr/build/bin/astr "$PKG/astr/build/bin/astr"
          cp -a template_case rana2013_r13 audits patches RANA2013_R13_FORMULA_AUDIT.md "$PKG/"
          cp -a smoke_rana/analysis smoke_rana/smoke.log smoke_rana/smoke_status.txt smoke_rana/smoke_gate_report.json "$PKG/smoke_validation/"
          test -x "$PKG/astr/build/bin/astr"
      - uses: actions/upload-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          path: ASTR_RANA2013_R13_AUDITED
          compression-level: 6
          retention-days: 14

  matrix-runtime-preflight:
    needs: audit-build-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install matrix runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openmpi-bin libopenmpi-dev libhdf5-openmpi-dev \
            python3-h5py python3-numpy zip time
      - uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          path: audited
      - name: Locate and validate audited executable
        shell: bash
        run: |
          set -euxo pipefail
          echo "===== downloaded artifact tree ====="
          find audited -maxdepth 4 -printf '%y %p %s bytes\n' | sort | tee audited/artifact_tree.txt
          EXE=$(find audited -maxdepth 4 -type f -name astr -print -quit)
          test -n "$EXE"
          chmod +x "$EXE"
          file "$EXE" | tee audited/executable_file.txt
          ldd "$EXE" | tee audited/executable_ldd.txt
          if grep -q 'not found' audited/executable_ldd.txt; then
            echo "Missing shared-library dependency in audited executable" >&2
            exit 2
          fi
          mpirun --version | tee audited/mpirun_version.txt
          test -x "$EXE"
      - name: Upload matrix runtime preflight
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RANA2013_R13_MATRIX_RUNTIME_PREFLIGHT
          path: |
            audited/artifact_tree.txt
            audited/executable_file.txt
            audited/executable_ldd.txt
            audited/mpirun_version.txt
          retention-days: 14

  paper-anchor:
    needs: matrix-runtime-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install matrix runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran openmpi-bin libopenmpi-dev libhdf5-openmpi-dev \
            python3-h5py python3-numpy zip time
      - uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          path: audited
      - name: Verify executable runtime and generate anchor case
        run: |
          set -euo pipefail
          BIN="$PWD/audited/astr/build/bin/astr"
          if [[ ! -f "$BIN" ]]; then
            find audited -maxdepth 5 -printf '%y %p\n' | sort
            echo '::error::Audited solver executable is missing or has the wrong artifact layout'
            exit 2
          fi
          chmod 0755 "$BIN"
          ldd "$BIN" 2>&1 | tee audited/ldd.log
          if grep -Fq 'not found' audited/ldd.log; then
            echo '::error::Missing solver runtime dependency'
            exit 2
          fi
          test -x "$BIN"
          python3 audited/rana2013_r13/make_rana2013_case.py \
            --template-case audited/template_case --output case \
            --paper-kn 0.0798 --grid-points 75 --maxstep 5000 \
            --dt 1.0e-5 --checkpoint-every 100
      - name: Run Kn 0.0798 N75 anchor from equilibrium
        id: solve
        continue-on-error: true
        env:
          WALLCLOCK_MINUTES: 60
        run: bash audited/rana2013_r13/run_rana2013_case.sh "$PWD/case" "$PWD/audited/astr/build/bin/astr" "$PWD/audited/rana2013_r13/rana2013_reference.json"
      - name: Require a finite 5k cadence diagnostic checkpoint
        env:
          SOLVE_OUTCOME: ${{ steps.solve.outcome }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import h5py
          import numpy as np

          def require_all_floating_datasets_finite(h5_path):
              if not h5_path.is_file():
                  raise SystemExit(f'missing required HDF5 file: {h5_path}')
              bad = []
              with h5py.File(h5_path, 'r') as h5:
                  def visit(name, obj):
                      if isinstance(obj, h5py.Dataset) and obj.dtype.kind in 'fc':
                          if not np.isfinite(np.asarray(obj[...])).all():
                              bad.append(name)
                  h5.visititems(visit)
              if bad:
                  raise SystemExit(f'non-finite floating datasets in {h5_path}: {bad}')

          if os.environ.get('SOLVE_OUTCOME') != 'success':
              raise SystemExit(f"anchor solve outcome={os.environ.get('SOLVE_OUTCOME')}")
          status_path = Path('case/analysis/run_status.json')
          if not status_path.is_file():
              raise SystemExit('Kn=0.0798 N=75 is missing analysis/run_status.json')
          status = json.loads(status_path.read_text())
          if status.get('status') != 'completed' or int(status.get('return_code', -1)) != 0:
              raise SystemExit(f'anchor run status is not complete: {status}')
          if int(status.get('last_checkpoint_step') or -1) != 5000:
              raise SystemExit(f'anchor status checkpoint is not 5000: {status}')
          path = Path('case/outdat/flowfield.h5')
          if not path.is_file():
              raise SystemExit('Kn=0.0798 N=75 produced no flowfield checkpoint')
          with h5py.File(path, 'r') as h:
              step = int(h['nstep'][0])
              if step != 5000:
                  raise SystemExit(f'anchor checkpoint nstep={step}, expected 5000')
              for key in ['ro', 'p', 't', 'u1', 'u2', 'qx', 'qy', 'sigmaxy', 'Rxy', 'Delta']:
                  if key not in h:
                      raise SystemExit(f'anchor checkpoint missing {key}')
                  values = np.asarray(h[key])
                  if not np.isfinite(values).all():
                      raise SystemExit(f'anchor checkpoint contains non-finite {key}')
              for key in ['ro', 'p', 't']:
                  if np.min(np.asarray(h[key])) <= 0:
                      raise SystemExit(f'anchor checkpoint contains non-positive {key}')
          require_all_floating_datasets_finite(path)
          require_all_floating_datasets_finite(Path('case/outdat/auxiliary.h5'))
          print(f'Validated Kn=0.0798 N=75 anchor checkpoint at nstep={step}')
          PY
      - name: Package anchor result
        if: always()
        run: |
          ROOT=RANA2013_R13_ANCHOR_KN_00798_N75_5K
          mkdir -p "$ROOT"
          cp -a case "$ROOT/" || true
          cp -a audited/audits audited/patches audited/RANA2013_R13_FORMULA_AUDIT.md audited/ldd.log "$ROOT/" || true
          zip -r -6 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RANA2013_R13_ANCHOR_KN_00798_N75_5K
          path: |
            RANA2013_R13_ANCHOR_KN_00798_N75_5K.zip
            RANA2013_R13_ANCHOR_KN_00798_N75_5K.zip.sha256
          compression-level: 0
          retention-days: 14

  paper-core:
    # Scientific hold: a 5k stability pass is not a convergence/release gate.
    if: ${{ false }}
    needs: [audit-build-smoke, paper-anchor]
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - {paper_kn: '0.010', tag: '0010'}
          - {paper_kn: '0.071', tag: '0071'}
          - {paper_kn: '0.0798', tag: '00798'}
          - {paper_kn: '0.141', tag: '0141'}
          - {paper_kn: '0.354', tag: '0354'}
          - {paper_kn: '0.3989', tag: '03989'}
          - {paper_kn: '0.707', tag: '0707'}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install matrix runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran openmpi-bin libopenmpi-dev libhdf5-openmpi-dev \
            python3-h5py python3-numpy zip time
      - uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          path: audited
      - name: Verify executable runtime and generate exact paper case
        run: |
          set -euo pipefail
          BIN="$PWD/audited/astr/build/bin/astr"
          if [[ ! -f "$BIN" ]]; then
            find audited -maxdepth 5 -printf '%y %p\n' | sort
            echo '::error::Audited solver executable is missing or has the wrong artifact layout'
            exit 2
          fi
          chmod 0755 "$BIN"
          ldd "$BIN" 2>&1 | tee audited/ldd.log
          if grep -Fq 'not found' audited/ldd.log; then
            echo '::error::Missing solver runtime dependency'
            exit 2
          fi
          test -x "$BIN"
          python3 audited/rana2013_r13/make_rana2013_case.py --template-case audited/template_case --output case --paper-kn ${{ matrix.paper_kn }} --grid-points 75 --maxstep 100000 --dt 1.0e-5 --checkpoint-every 5000
      - name: Run from equilibrium and analyze
        id: solve
        continue-on-error: true
        env:
          WALLCLOCK_MINUTES: 300
        run: bash audited/rana2013_r13/run_rana2013_case.sh "$PWD/case" "$PWD/audited/astr/build/bin/astr" "$PWD/audited/rana2013_r13/rana2013_reference.json"
      - name: Require a complete finite 100k core result
        env:
          SOLVE_OUTCOME: ${{ steps.solve.outcome }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import h5py
          import numpy as np

          def require_all_floating_datasets_finite(h5_path):
              if not h5_path.is_file():
                  raise SystemExit(f'missing required HDF5 file: {h5_path}')
              bad = []
              with h5py.File(h5_path, 'r') as h5:
                  def visit(name, obj):
                      if isinstance(obj, h5py.Dataset) and obj.dtype.kind in 'fc':
                          if not np.isfinite(np.asarray(obj[...])).all():
                              bad.append(name)
                  h5.visititems(visit)
              if bad:
                  raise SystemExit(f'non-finite floating datasets in {h5_path}: {bad}')

          if os.environ.get('SOLVE_OUTCOME') != 'success':
              raise SystemExit(f"core solve outcome={os.environ.get('SOLVE_OUTCOME')}")
          status_path = Path('case/analysis/run_status.json')
          if not status_path.is_file():
              raise SystemExit('core case is missing analysis/run_status.json')
          status = json.loads(status_path.read_text())
          if status.get('status') != 'completed' or int(status.get('return_code', -1)) != 0:
              raise SystemExit(f'core run status is not complete: {status}')
          if int(status.get('last_checkpoint_step') or -1) != 100000:
              raise SystemExit(f'core status checkpoint is not 100000: {status}')
          path = Path('case/outdat/flowfield.h5')
          if not path.is_file():
              raise SystemExit('core case produced no flowfield checkpoint')
          with h5py.File(path, 'r') as h:
              step = int(h['nstep'][0])
              if step != 100000:
                  raise SystemExit(f'core checkpoint nstep={step}, expected 100000')
              for key in ['ro', 'p', 't', 'u1', 'u2', 'qx', 'qy', 'sigmaxy', 'Rxy', 'Delta']:
                  if key not in h:
                      raise SystemExit(f'core checkpoint missing {key}')
                  values = np.asarray(h[key])
                  if not np.isfinite(values).all():
                      raise SystemExit(f'core checkpoint contains non-finite {key}')
              for key in ['ro', 'p', 't']:
                  if np.min(np.asarray(h[key])) <= 0:
                      raise SystemExit(f'core checkpoint contains non-positive {key}')
          require_all_floating_datasets_finite(path)
          require_all_floating_datasets_finite(Path('case/outdat/auxiliary.h5'))
          print('Validated complete finite core result at nstep=100000')
          PY
      - name: Package restartable result
        if: always()
        run: |
          ROOT=RANA2013_R13_CORE_KN_${{ matrix.tag }}_N75
          mkdir -p "$ROOT"
          cp -a case "$ROOT/" || true
          cp -a audited/audits audited/patches audited/RANA2013_R13_FORMULA_AUDIT.md audited/ldd.log "$ROOT/" || true
          zip -r -6 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RANA2013_R13_CORE_KN_${{ matrix.tag }}_N75
          path: |
            RANA2013_R13_CORE_KN_${{ matrix.tag }}_N75.zip
            RANA2013_R13_CORE_KN_${{ matrix.tag }}_N75.zip.sha256
          compression-level: 0
          retention-days: 14

  paper-grid-study:
    # Scientific hold: keep the full matrix locked until matched-time and
    # sustained-convergence gates pass on the corrected anchor.
    if: ${{ false }}
    needs: [audit-build-smoke, paper-anchor]
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        paper_kn: ['0.05', '0.10', '0.50']
        grid_points: [40, 50, 75, 100, 200, 400]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install matrix runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran openmpi-bin libopenmpi-dev libhdf5-openmpi-dev \
            python3-h5py python3-numpy zip time
      - uses: actions/download-artifact@v4
        with:
          name: ASTR_RANA2013_R13_AUDITED_SOURCE
          path: audited
      - name: Verify executable runtime and generate exact mesh-study case
        run: |
          set -euo pipefail
          BIN="$PWD/audited/astr/build/bin/astr"
          if [[ ! -f "$BIN" ]]; then
            find audited -maxdepth 5 -printf '%y %p\n' | sort
            echo '::error::Audited solver executable is missing or has the wrong artifact layout'
            exit 2
          fi
          chmod 0755 "$BIN"
          ldd "$BIN" 2>&1 | tee audited/ldd.log
          if grep -Fq 'not found' audited/ldd.log; then
            echo '::error::Missing solver runtime dependency'
            exit 2
          fi
          test -x "$BIN"
          python3 audited/rana2013_r13/make_rana2013_case.py --template-case audited/template_case --output case --paper-kn ${{ matrix.paper_kn }} --grid-points ${{ matrix.grid_points }} --maxstep 100000 --dt 1.0e-5 --checkpoint-every 5000
      - name: Run mesh case and retain last checkpoint
        id: solve
        continue-on-error: true
        env:
          WALLCLOCK_MINUTES: 300
        run: bash audited/rana2013_r13/run_rana2013_case.sh "$PWD/case" "$PWD/audited/astr/build/bin/astr" "$PWD/audited/rana2013_r13/rana2013_reference.json"
      - name: Require a complete finite 100k grid result
        env:
          SOLVE_OUTCOME: ${{ steps.solve.outcome }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import h5py
          import numpy as np

          def require_all_floating_datasets_finite(h5_path):
              if not h5_path.is_file():
                  raise SystemExit(f'missing required HDF5 file: {h5_path}')
              bad = []
              with h5py.File(h5_path, 'r') as h5:
                  def visit(name, obj):
                      if isinstance(obj, h5py.Dataset) and obj.dtype.kind in 'fc':
                          if not np.isfinite(np.asarray(obj[...])).all():
                              bad.append(name)
                  h5.visititems(visit)
              if bad:
                  raise SystemExit(f'non-finite floating datasets in {h5_path}: {bad}')

          if os.environ.get('SOLVE_OUTCOME') != 'success':
              raise SystemExit(f"grid solve outcome={os.environ.get('SOLVE_OUTCOME')}")
          status_path = Path('case/analysis/run_status.json')
          if not status_path.is_file():
              raise SystemExit('grid case is missing analysis/run_status.json')
          status = json.loads(status_path.read_text())
          if status.get('status') != 'completed' or int(status.get('return_code', -1)) != 0:
              raise SystemExit(f'grid run status is not complete: {status}')
          if int(status.get('last_checkpoint_step') or -1) != 100000:
              raise SystemExit(f'grid status checkpoint is not 100000: {status}')
          path = Path('case/outdat/flowfield.h5')
          if not path.is_file():
              raise SystemExit('grid case produced no flowfield checkpoint')
          with h5py.File(path, 'r') as h:
              step = int(h['nstep'][0])
              if step != 100000:
                  raise SystemExit(f'grid checkpoint nstep={step}, expected 100000')
              for key in ['ro', 'p', 't', 'u1', 'u2', 'qx', 'qy', 'sigmaxy', 'Rxy', 'Delta']:
                  if key not in h:
                      raise SystemExit(f'grid checkpoint missing {key}')
                  values = np.asarray(h[key])
                  if not np.isfinite(values).all():
                      raise SystemExit(f'grid checkpoint contains non-finite {key}')
              for key in ['ro', 'p', 't']:
                  if np.min(np.asarray(h[key])) <= 0:
                      raise SystemExit(f'grid checkpoint contains non-positive {key}')
          require_all_floating_datasets_finite(path)
          require_all_floating_datasets_finite(Path('case/outdat/auxiliary.h5'))
          print('Validated complete finite grid result at nstep=100000')
          PY
      - name: Package grid result
        if: always()
        run: |
          KTAG=$(echo '${{ matrix.paper_kn }}' | tr -d '.')
          ROOT=RANA2013_R13_GRID_KN_${KTAG}_N${{ matrix.grid_points }}
          mkdir -p "$ROOT"
          cp -a case "$ROOT/" || true
          cp -a audited/audits audited/patches audited/RANA2013_R13_FORMULA_AUDIT.md audited/ldd.log "$ROOT/" || true
          zip -r -4 "${ROOT}.zip" "$ROOT"
          sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RANA2013_R13_GRID_KN_${{ matrix.paper_kn }}_N${{ matrix.grid_points }}
          path: |
            RANA2013_R13_GRID_*.zip
            RANA2013_R13_GRID_*.zip.sha256
          compression-level: 0
          retention-days: 14
